<!DOCTYPE html>
<html>
<head>

<title>Verdrift</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:white;
font-family:Inter, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
max-width:700px;
}

.logo{
font-size:70px;
font-weight:600;
letter-spacing:4px;
margin-bottom:10px;
}

.tagline{
font-size:22px;
color:#888;
margin-bottom:40px;
}

.example{
background:#0f0f0f;
border:1px solid #1a1a1a;
padding:30px;
border-radius:12px;
margin-bottom:30px;
}

.question{
font-size:20px;
margin-bottom:25px;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
}

button{
padding:14px 28px;
border-radius:8px;
border:none;
font-size:16px;
cursor:pointer;
}

.yes{
background:white;
color:black;
}

.no{
background:#1c1c1c;
color:white;
border:1px solid #333;
}

.waitlist{
margin-top:30px;
padding:14px 26px;
background:white;
color:black;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">VERDRIFT</div>

<div class="tagline">Take a judgement.</div>

<div class="example">

<div class="question">
Will AI replace 30% of white-collar jobs before 2035?
</div>

<div class="buttons">
<button class="yes">YES</button>
<button class="no">NO</button>
</div>

</div>

<button class="waitlist">Join Early Access</button>

</div>

</body>
</html>
