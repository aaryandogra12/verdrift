<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERDRIFT | SGI_TERMINAL v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #0a0a0c;
            --bg-elevated: rgba(20, 20, 24, 0.85);
            --border-subtle: rgba(255,255,255,0.06);
            --border-highlight: rgba(52,211,153,0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a8;
            --accent-green: #34d399;
            --spring-easing: cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing:border-box; margin:0; padding:0; user-select:none; }
        body {
            background:#050505;
            color:var(--text-primary);
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;
            height:100vh; overflow:hidden; position:relative;
        }
        #drift-canvas { position:fixed; inset:0; z-index:-1; opacity:0.85; }
        
        header {
            padding:20px 40px; display:flex; justify-content:space-between; align-items:center;
            font-size:12px; font-weight:500; letter-spacing:1px; color:var(--text-secondary);
            border-bottom:1px solid var(--border-subtle); backdrop-filter:blur(20px);
        }
        .dot { width:8px; height:8px; background:var(--accent-green); border-radius:50%; box-shadow:0 0 20px var(--accent-green); animation:pulse 1.8s infinite; }
        @keyframes pulse { 50% { opacity:0.3; } }

        main { display:flex; flex:1; overflow:hidden; }
        #sidebar, #right-panel {
            width:240px; background:var(--bg-surface); padding:28px 16px; overflow-y:auto;
            border-right/left:1px solid var(--border-subtle);
        }
        .market-item {
            padding:16px; border-radius:12px; margin-bottom:10px; cursor:pointer;
            transition:all 0.4s var(--spring-easing); border:1px solid transparent;
        }
        .market-item:hover, .market-item.active { background:var(--bg-elevated); border-color:var(--border-highlight); }

        #terminal {
            flex:1; display:flex; align-items:center; justify-content:center; padding:40px; perspective:1600px;
        }
        #card-container {
            width:100%; max-width:540px; background:var(--bg-surface);
            border:1px solid var(--border-subtle); border-radius:20px;
            padding:52px 44px; position:relative; overflow:hidden;
            box-shadow:0 40px 100px -20px rgba(0,0,0,0.95),
                       inset 0 2px 0 rgba(255,255,255,0.08),
                       0 0 80px -20px rgba(52,211,153,0.15);
            transition:transform 0.5s var(--spring-easing);
        }
        .card-meta { font-family:ui-monospace,monospace; font-size:11px; color:#666; display:flex; justify-content:space-between; margin-bottom:24px; }
        .card-title { font-size:27px; line-height:1.25; font-weight:600; letter-spacing:-0.02em; margin-bottom:32px; }
        
        .data-panel {
            background:rgba(0,0,0,0.5); border:1px solid var(--border-subtle); border-radius:12px;
            padding:24px; margin-bottom:36px;
        }
        .sparkline path { stroke:var(--accent-green); stroke-width:3; }
        
        .btn-strike {
            padding:22px; border-radius:12px; font-size:15px; font-weight:600;
            cursor:pointer; transition:all 0.3s var(--spring-easing);
        }
        .btn-yes { background:#fff; color:#000; }
        .btn-no { background:transparent; border:1px solid var(--border-highlight); color:#fff; }

        #glass-overlay {
            position:absolute; inset:0; background:rgba(10,10,15,0.92);
            backdrop-filter:blur(24px); border-radius:20px; display:none;
            align-items:center; justify-content:center; flex-direction:column;
        }
        #glass-overlay.active { display:flex; }
        .timer-ring { font-size:88px; font-weight:300; letter-spacing:-4px; margin-bottom:16px; }

        .log-entry { padding:14px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:10px; font-size:13px; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <canvas id="drift-canvas"></canvas>
    
    <header>
        <div><span class="dot"></span> VERDRIFT ALPHA v3.0</div>
        <div style="color:var(--accent-green);font-family:monospace;">DRIFT SCORE <span id="score-value">083</span></div>
        <div>[ <span id="hud-count">0</span>/∞ ] SIGNAL LOCKED</div>
    </header>

    <main>
        <div id="sidebar"></div>
        
        <div id="terminal">
            <div id="card-container">
                <!-- reality core + glass overlay same as before but cleaner -->
                <div id="reality-core">
                    <div class="card-meta">
                        <span style="color:#ef4444;">MAR 11 2026</span>
                        <span id="pm-id">PM-001</span>
                    </div>
                    <h1 class="card-title" id="r-title"></h1>
                    
                    <div class="data-panel">
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;color:var(--text-secondary);">
                            <span>PROXY ODDS</span>
                            <span id="r-odds" style="color:var(--accent-green);font-weight:600;"></span>
                        </div>
                        <div class="sparkline">
                            <svg viewBox="0 0 100 50" preserveAspectRatio="none"><path id="spark-path"/></svg>
                        </div>
                    </div>
                    
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <button class="btn-strike btn-yes" onclick="strike('YES')">STRIKE YES</button>
                        <button class="btn-strike btn-no" onclick="strike('NO')">STRIKE NO</button>
                    </div>
                </div>
                
                <div id="glass-overlay">
                    <div id="undo-state">
                        <div class="timer-ring" id="timer">3</div>
                        <div style="color:var(--accent-green);font-size:11px;letter-spacing:2px;margin-bottom:32px;">LOCKING SIGNAL</div>
                        <button onclick="abort()" style="background:transparent;border:1px solid #555;border-radius:999px;padding:10px 28px;color:#888;cursor:pointer;">ABORT</button>
                    </div>
                    <div id="settled-state" class="hidden" style="text-align:center;max-width:260px;">
                        <div id="result-status" style="font-size:15px;font-weight:600;margin-bottom:12px;"></div>
                        <div id="result-text" style="font-size:13.5px;line-height:1.5;color:var(--text-secondary);"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="right-panel"><div style="font-size:10px;color:#555;margin-bottom:12px;padding-left:8px;">STRIKE LOG</div><div id="drift-log"></div></div>
    </main>

</body>
</html>
